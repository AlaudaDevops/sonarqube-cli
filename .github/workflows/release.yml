name: Release

on:
  push:
    tags:
      - 'sonarqube-cli-v*'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -o sonarqube-cli-linux-amd64 ./cmd
          GOOS=linux GOARCH=arm64 go build -o sonarqube-cli-linux-arm64 ./cmd
          GOOS=darwin GOARCH=amd64 go build -o sonarqube-cli-darwin-amd64 ./cmd
          GOOS=darwin GOARCH=arm64 go build -o sonarqube-cli-darwin-arm64 ./cmd

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            sonarqube-cli-*
